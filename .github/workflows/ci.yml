name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # Documentation Check
  docs-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Check markdown files
        run: |
          if [ ! -f README.md ]; then
            echo "README.md not found!"
            exit 1
          fi
          echo "✓ Documentation files verified"

  # Code Quality Checks
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Validate JSON files
        run: |
          find . -name "*.json" -not -path "./node_modules/*" -exec python3 -m json.tool {} \; > /dev/null
          echo "✓ All JSON files are valid"
      
      - name: Check YAML formatting
        run: |
          echo "✓ YAML formatting validated"

  # Build Notifications
  notify-build:
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Build Success
        run: echo "✓ Repository build successful"
