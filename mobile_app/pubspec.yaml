name: nepal_smart_travel
description: "Nepal Smart Travel & Local Intelligence Platform - Mobile App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.2

  # API & Networking
  dio: ^5.7.0
  http: ^1.2.2

  # Maps & Location
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # Local Storage
  shared_preferences: ^2.3.4
  sqflite: ^2.4.1
  path_provider: ^2.1.5

  # Media
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # Authentication & Security
  flutter_secure_storage: ^9.2.4

  # UI & Design
  flutter_screenutil: ^5.9.3
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  fluttertoast: ^8.2.8
  badges: ^3.1.2
  lottie: ^3.1.3
  fl_chart: ^0.69.2

  # Utils
  intl: ^0.19.0
  uuid: ^4.5.1
  connectivity_plus: ^6.1.1
  url_launcher: ^6.3.1
  permission_handler: ^11.3.1
  share_plus: ^10.1.4
  google_sign_in: ^7.2.0
  firebase_messaging: ^15.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/